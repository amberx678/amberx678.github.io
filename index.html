<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文档</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: #525659; }
        /* 让 pdf 查看器占满整个屏幕 */
        #pdf-viewer { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <!-- 嵌入 pdf.js 的查看器，并使用国内可用的 CDN 地址 -->
    <iframe id="pdf-viewer" src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/web/viewer.html?file=https://raw.githubusercontent.com/amberx678/amberx678.github.io/main/dzqz.rlsbt.zj.pdf"></iframe>
</body>
</html>
